<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GESTÃO MACHADO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1D9E75">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- Tela de Carregamento Inicial -->
    <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10000;">
        <div style="font-size: 50px; animation: pulse 1.5s infinite;">🏠</div>
        <div style="margin-top:20px; font-weight:bold; color:var(--primary);">CARREGANDO...</div>
    </div>

    <!-- Autenticação -->

    <div id="auth-screen">
        <div class="login-card">
            <div style="font-size: 50px;">🏠</div>
            <h1 style="color: var(--primary); margin-bottom: 25px;">GESTÃO MACHADO</h1>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="auth-email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <button class="btn-main" onclick="handleAuth()" id="btn-login">ENTRAR</button>
            <div style="margin-top: 20px; font-size: 14px; color: #666;">
                <span id="auth-switch-text">Novo por aqui?</span>
                <a href="#" onclick="toggleAuthMode()" id="auth-switch-link" style="color: var(--primary); font-weight: 700;">Cadastre-se</a>
            </div>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <div id="app-content" class="hidden">
        <header>
            <div class="logo">GESTÃO <span style="color: #333;">MACHADO</span></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="user-display" class="user-tag"></span>
                <button onclick="handleLogout()" style="background: none; border: none; font-size: 18px;">🚪</button>
            </div>
        </header>

        <main>
            <!-- Dashboard -->
            <section id="tab-home">
                <div class="stats-scroll">
                    <div class="stat-mini-card">
                        <span>Receita</span>
                        <h2 id="stat-revenue">R$ 0</h2>
                    </div>
                    <div class="stat-mini-card" style="border-bottom: 4px solid var(--success);">
                        <span>Pagos</span>
                        <h2 id="stat-paid">0</h2>
                    </div>
                    <div class="stat-mini-card" style="border-bottom: 4px solid var(--danger);">
                        <span>Pendentes</span>
                        <h2 id="stat-pending">0</h2>
                    </div>
                </div>

                <div style="padding: 15px; background: #fff3cd; color: #856404; margin: 0 15px 20px; border-radius: 15px; display: none; align-items: center; gap: 10px;" id="alert-banner">
                    <span>⚠️</span> <b id="alert-text"></b>
                </div>

                <div id="home-list" class="list-container">
                    <!-- Cards aqui -->
                </div>
            </section>

            <!-- Imóveis -->
            <section id="tab-properties" class="hidden">
                <div style="padding: 15px;">
                    <input type="text" id="search-input" placeholder="🔍 Buscar inquilino..." oninput="renderProperties()" style="background: white;">
                </div>
                <div id="full-list" class="list-container">
                    <!-- Lista completa aqui -->
                </div>
            </section>

            <!-- Contratos -->
            <section id="tab-contracts" class="hidden">
                <div id="contracts-list" class="list-container" style="padding-top: 20px;">
                    <!-- Contratos aqui -->
                </div>
            </section>
        </main>

        <button class="fab" onclick="openModal('property-modal')">+</button>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', this)">
                <i>🏠</i>
                <span>Início</span>
            </button>
            <button class="nav-item" onclick="switchTab('properties', this)">
                <i>📋</i>
                <span>Imóveis</span>
            </button>
            <button class="nav-item" onclick="switchTab('contracts', this)">
                <i>📄</i>
                <span>Contratos</span>
            </button>
        </nav>
    </div>

    <!-- Modal de Cadastro -->
    <div id="property-modal" class="modal" style="display: none; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="modal-title">Novo Imóvel</h2>
            <button onclick="closeModal('property-modal')" style="background: #f0f0f0; border: none; padding: 10px 15px; border-radius: 50%; font-size: 20px;">&times;</button>
        </div>
        <form onsubmit="saveProperty(event)" id="property-form">
            <input type="hidden" id="prop-id">
            <label>Inquilino</label>
            <input type="text" id="prop-name" placeholder="Nome Completo" required>
            <label>WhatsApp</label>
            <input type="tel" id="prop-phone" placeholder="(11) 99999-9999" required>
            <label>Endereço</label>
            <input type="text" id="prop-address" placeholder="Rua, Número..." required>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Valor (R$)</label>
                    <input type="number" id="prop-value" step="0.01" placeholder="0.00" required>
                </div>
                <div>
                    <label>Dia Vencimento</label>
                    <input type="number" id="prop-due" min="1" max="31" placeholder="1-31" required>
                </div>
            </div>
            <label>Contrato (Arquivo/Foto)</label>
            <input type="file" id="prop-file" accept="image/*,.pdf">
            <button type="submit" class="btn-main" style="margin-top: 30px;">SALVAR</button>
            <button type="button" id="delete-btn" onclick="deleteProperty()" class="hidden" style="width: 100%; background: none; color: var(--danger); border: none; margin-top: 15px; font-weight: bold;">EXCLUIR IMÓVEL</button>
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
