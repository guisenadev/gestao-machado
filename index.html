<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GESTÃO MACHADO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1D9E75">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen">
        <div class="login-card">
            <div style="font-size: 50px; margin-bottom: 10px;">🏠</div>
            <h1>GESTÃO MACHADO</h1>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" autocapitalize="none">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">ENTRAR</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app-content" class="hidden">
        <header>
            <div style="font-weight: 800; color: var(--primary); letter-spacing: -1px; font-size: 20px;">GESTÃO <span style="color: #333;">MACHADO</span></div>
            <button class="btn btn-logout" onclick="handleLogout()">Sair</button>
        </header>

        <main class="container">
            <!-- Aba Início (Dashboard) -->
            <section id="tab-home">
                <div id="alert-banner" class="alert-banner">
                    <span style="font-size: 20px;">⚠️</span>
                    <span id="alert-text">Existem imóveis com aluguel atrasado!</span>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span>Total Imóveis</span>
                        <h2 id="stat-total">0</h2>
                    </div>
                    <div class="stat-card">
                        <span>Receita Mensal</span>
                        <h2 id="stat-revenue">R$ 0</h2>
                    </div>
                    <div class="stat-card stat-success">
                        <span>Em dia</span>
                        <h2 id="stat-on-time">0</h2>
                    </div>
                    <div class="stat-card stat-danger">
                        <span>Atrasados</span>
                        <h2 id="stat-late">0</h2>
                    </div>
                </div>

                <h3 class="section-title">Resumo Rápido</h3>
                <div id="recent-list">
                    <!-- Cards de imóveis aparecem aqui -->
                </div>
            </section>

            <!-- Aba Imóveis -->
            <section id="tab-properties" class="hidden">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar inquilino ou endereço..." oninput="renderProperties()">
                </div>
                
                <div class="filter-scroll">
                    <button class="filter-pill active" onclick="filterStatus('all', this)">Todos</button>
                    <button class="filter-pill" onclick="filterStatus('late', this)">Atrasados</button>
                    <button class="filter-pill" onclick="filterStatus('near', this)">Vencendo</button>
                    <button class="filter-pill" onclick="filterStatus('in-day', this)">Em dia</button>
                </div>

                <div id="full-property-list"></div>
            </section>

            <!-- Aba Contratos -->
            <section id="tab-contracts" class="hidden">
                <h3 class="section-title">Arquivos de Contrato</h3>
                <div id="contracts-list">
                    <!-- Lista de contratos aqui -->
                </div>
            </section>
        </main>

        <!-- Barra de Navegação Inferior -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', this)">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Início</span>
            </button>
            <button class="nav-item" onclick="switchTab('properties', this)">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Imóveis</span>
            </button>
            <button class="nav-item" onclick="switchTab('contracts', this)">
                <span class="nav-icon">📄</span>
                <span class="nav-label">Contratos</span>
            </button>
        </nav>

        <!-- Botão Flutuante -->
        <button class="btn-floating" onclick="openModal('property-modal')">
            <span>+</span>
        </button>
    </div>

    <!-- Modal de Cadastro -->
    <div id="property-modal" class="modal-overlay" onclick="if(event.target == this) closeModal('property-modal')">
        <div class="modal-content">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h2 id="modal-title">Novo Imóvel</h2>
                <button class="close-modal" onclick="closeModal('property-modal')">&times;</button>
            </div>
            <form id="property-form" onsubmit="saveProperty(event)">
                <input type="hidden" id="prop-id">
                <div class="input-group">
                    <label>Nome do Inquilino</label>
                    <input type="text" id="prop-name" placeholder="Ex: João Silva" required>
                </div>
                <div class="input-group">
                    <label>WhatsApp (com DDD)</label>
                    <input type="tel" id="prop-phone" placeholder="Ex: 11999998888" inputmode="tel" required>
                </div>
                <div class="input-group">
                    <label>Endereço</label>
                    <input type="text" id="prop-address" placeholder="Rua, número, bairro..." required>
                </div>
                <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                    <div class="input-group">
                        <label>Valor Aluguel</label>
                        <input type="number" id="prop-value" step="0.01" placeholder="0,00" inputmode="decimal" required>
                    </div>
                    <div class="input-group">
                        <label>Dia Vencimento</label>
                        <input type="number" id="prop-due" min="1" max="31" placeholder="1 a 31" inputmode="numeric" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Observações</label>
                    <textarea id="prop-notes" rows="3" placeholder="Algo importante sobre este imóvel..."></textarea>
                </div>
                <div class="input-group">
                    <label>Contrato (PDF ou Foto)</label>
                    <input type="file" id="prop-file" accept="image/*,.pdf" class="file-input">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">SALVAR</button>
                    <button type="button" id="delete-btn" class="btn btn-danger hidden" style="flex: 1;" onclick="deleteProperty()">EXCLUIR</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
